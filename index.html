<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        (function() {
            const userLang = navigator.language || navigator.userLanguage;
            const shortLang = userLang.toLowerCase().split('-')[0];

           
            const supportedLanguages = [
                'uk', 'en', 'el', 'pl', 'de', 'fr', 'es', 'it', 'pt', 
                'cs', 'sk', 'sl', 'hu', 'ro', 'bg', 'it', 
                'sv', 'nl', 'no', 'tr', 'ru'
            ];

            // Якщо мова підтримується — беремо її, якщо ні — за замовчуванням 'en'
            const targetLang = supportedLanguages.includes(shortLang) ? shortLang : 'en';

            // Динамічно вираховуємо базовий шлях (враховує назву репозиторію на GitHub)
            let basePath = window.location.pathname;
            if (basePath.endsWith('.html')) {
                basePath = basePath.substring(0, basePath.lastIndexOf('/') + 1);
            } else if (!basePath.endsWith('/')) {
                basePath += '/';
            }

            // Перенаправлення через replace (користувач не "застрягне" при натисканні кнопки Назад)
            window.location.replace(window.location.origin + basePath + targetLang + '/index.html');
        })();
    </script>
</head>
<body>
    </body>
</html>
